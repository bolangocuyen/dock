name: Test Docker Image
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Pull image
        run: docker pull excedrin/adv:latest
      - name: Test image
        run: |
          docker run --rm excedrin/adv:latest bash -c '
            set -eux
            file /system/bin/aarch64-linux-android/zstd
            echo "=== Environment ==="
            env | grep -E "^(ANDROID|JAVA|CMAKE|PATH|LC_ALL|REACT_NATIVE)=" | sort
            echo "=== Java ==="
            java -version
            echo "=== Node ==="
            node --version
            npm --version
            yarn --version
            echo "=== Python ==="
            python3 --version
            echo "=== SDK Manager ==="
            sdkmanager --version
            echo "=== ADB ==="
            if [ "$(uname -m)" = "x86_64" ]; then adb version; else echo "adb skipped (not x86_64 host)"; fi
            echo "=== CMake ==="
            cmake --version
            echo "=== NDK ==="
            # NDK contents were flattened directly into ${ANDROID_HOME} (no /system/ndk/<version> dir anymore)
            cat ${ANDROID_HOME}/source.properties 2>/dev/null || echo "source.properties not found"
            ls -d ${ANDROID_HOME}/sysroot ${ANDROID_HOME}/sources ${ANDROID_HOME}/platforms \
                  ${ANDROID_HOME}/build ${ANDROID_HOME}/meta ${ANDROID_HOME}/shader-tools \
                  ${ANDROID_HOME}/simpleperf 2>/dev/null || true
            echo "=== SDK Layout ==="
            ls ${ANDROID_HOME}/cmdline-tools \
               ${ANDROID_HOME}/platform-tools \
               ${ANDROID_HOME}/build-tools \
               ${ANDROID_HOME}/platforms \
               ${ANDROID_HOME}/cmake
            echo "=== Installed Packages ==="
            sdkmanager --list_installed
            echo "=== React Native Downloads ==="
            ls ${REACT_NATIVE_DOWNLOADS_DIR}/
            echo "=== Clang Toolchain (toolchains/llvm/prebuilt/linux-x86_64) ==="
            # NOTE: this path is repopulated from the AOSP clang-repo prebuilt AFTER the NDK
            # flatten step wipes it (rm -rf .../linux-x86_64/*), so the NDK per-target wrapper
            # scripts (e.g. aarch64-linux-android35-clang) no longer live here - only the
            # plain AOSP host clang/clang++ binaries do.
            CLANG_BIN=${ANDROID_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin
            "${CLANG_BIN}/clang" --version
            "${CLANG_BIN}/clang++" --version
            echo "--- per-target wrapper scripts (expected gone after AOSP clang overwrite) ---"
            for triple in \
                aarch64-linux-android \
                armv7a-linux-androideabi \
                i686-linux-android \
                x86_64-linux-android; do
              clang="${CLANG_BIN}/${triple}35-clang"
              printf "%-45s -> " "${triple}"
              if [ -x "${clang}" ]; then
                "${clang}" --version | head -1
              else
                echo "not found (overwritten by AOSP host clang)"
              fi
            done
            echo "=== GCC / G++ ==="
            gcc --version | head -1
            g++ --version | head -1
            echo "=== Build Systems (make/ninja/cmake) ==="
            make --version | head -1
            ninja --version
            echo "=== Ccache ==="
            ccache --version | head -1
            echo "=== Ruby / Bundler ==="
            ruby --version
            gem --version
            bundle --version
            echo "=== Linters (jq / shellcheck) ==="
            jq --version
            shellcheck --version | head -2
            echo "=== Lexer / Parser Tools (flex/bison/m4) ==="
            flex --version
            bison --version
            m4 --version | head -1
            echo "=== Compression Tools (zip/unzip/xz/zstd) ==="
            zip --version | head -2
            unzip -v | head -1
            xz --version | head -1
            /usr/bin/zstd --version
            echo "=== Misc Utilities (rsync/patch/texinfo/file/bc) ==="
            rsync --version | head -1
            patch --version | head -1
            texi2any --version 2>/dev/null | head -1 || true
            file --version | head -1
            bc --version | head -1
            echo "=== ICU (libicu-dev) ==="
            dpkg -l | grep -i libicu || true
            echo "=== Git ==="
            git --version
            git config --global --list | grep safe
            echo "=== Sudo ==="
            sudo --version | head -1
            echo "=== Timezone Data ==="
            cat /etc/timezone 2>/dev/null || true
            echo "=== Locale (LC_ALL) ==="
            locale
            echo "=== Disk Usage Summary ==="
            df -h /
            du -sh ${ANDROID_HOME} 2>/dev/null || true
            du -sh ${REACT_NATIVE_DOWNLOADS_DIR} 2>/dev/null || true
          '
